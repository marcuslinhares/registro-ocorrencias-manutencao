# CI/CD Pipeline - Quality & Deploy
#
# Required GitHub Secrets:
#   VPS_SSH_HOST        - VPS server IP or hostname
#   VPS_SSH_USER        - SSH username for VPS
#   VPS_SSH_KEY         - Private SSH key for VPS access
#   VPS_SSH_PORT        - SSH port (e.g. 22)
#   GHCR_PAT            - Personal Access Token with read:packages scope (used by VPS to pull images)
#   DATABASE_URL        - Database connection string for backend on VPS
#   NEXT_PUBLIC_API_URL - Public API URL for the frontend on VPS

name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend

jobs:
  # ──────────────────────────────────────────
  # Tests
  # ──────────────────────────────────────────

  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npx jest --coverage

  backend-e2e-tests:
    name: Backend E2E Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npx jest --config ./test/jest-e2e.json

  frontend-unit-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npx jest --coverage

  frontend-e2e-tests:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test

  # ──────────────────────────────────────────
  # Build & Push Docker Images (only on main)
  # ──────────────────────────────────────────

  build-backend:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    needs:
      - backend-unit-tests
      - backend-e2e-tests
      - frontend-unit-tests
      - frontend-e2e-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

  build-frontend:
    name: Build & Push Frontend Image
    runs-on: ubuntu-latest
    needs:
      - backend-unit-tests
      - backend-e2e-tests
      - frontend-unit-tests
      - frontend-e2e-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  # ──────────────────────────────────────────
  # Deploy to VPS
  # ──────────────────────────────────────────

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs:
      - build-backend
      - build-frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: docker-compose.prod.yml
          target: ~/app

      - name: Deploy containers on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            export DATABASE_URL="${{ secrets.DATABASE_URL }}"
            export NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}"
            export BACKEND_IMAGE="${{ env.BACKEND_IMAGE }}:latest"
            export FRONTEND_IMAGE="${{ env.FRONTEND_IMAGE }}:latest"

            cd ~/app
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
