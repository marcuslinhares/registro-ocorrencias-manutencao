# CI/CD Pipeline - Quality & Deploy
#
# Required GitHub Secrets:
#   VPS_SSH_HOST        - VPS server IP or hostname
#   VPS_SSH_USER        - SSH username for VPS
#   VPS_SSH_KEY         - Private SSH key for VPS access
#   VPS_SSH_PORT        - SSH port (default 22)
#   GHCR_PAT            - Personal Access Token with read:packages scope
#   DATABASE_URL        - Database connection string (Atlas for VPS)
#   NEXT_PUBLIC_API_URL - Public API URL (Domain for VPS)

name: CI/CD Pipeline

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend

jobs:
  # ──────────────────────────────────────────
  # Tests
  # ──────────────────────────────────────────

  backend-tests:
    name: Backend Tests (Unit & E2E)
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --replSet rs0
          --health-cmd "echo 'db.runCommand({ping:1}).ok' | mongosh localhost:27017/test --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: mongodb://localhost:27017/test-db?directConnection=true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      
      - name: Setup MongoDB Replica Set
        run: |
          docker exec ${{ job.services.mongodb.id }} mongosh --eval "rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'localhost:27017'}]})" || true
          sleep 10
        continue-on-error: true

      - run: npm install
      - run: npx prisma generate
      - run: npx jest --coverage
      - run: npx jest --config ./test/jest-e2e.json

  frontend-tests:
    name: Frontend Tests (Unit & E2E)
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --replSet rs0
          --health-cmd "echo 'db.runCommand({ping:1}).ok' | mongosh localhost:27017/test --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    env:
      DATABASE_URL: mongodb://localhost:27017/test-db?directConnection=true
      NEXT_PUBLIC_API_URL: http://localhost:4000/graphql
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      
      - name: Setup MongoDB Replica Set
        run: |
          docker exec ${{ job.services.mongodb.id }} mongosh --eval "rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'localhost:27017'}]})" || true
          sleep 10
        continue-on-error: true

      - run: npm install
      
      # We need the backend running for frontend E2E tests
      - name: Start Backend in background
        run: |
          cd ../backend
          npm install
          npx prisma generate
          npm run build
          DATABASE_URL=mongodb://localhost:27017/test-db?directConnection=true PORT=4000 npm run start:prod &
          npx wait-on tcp:4000 --timeout 60000
        env:
          DATABASE_URL: mongodb://localhost:27017/test-db?directConnection=true
          PORT: 4000

      - run: npx jest --coverage
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test --reporter=list
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/graphql

  # ──────────────────────────────────────────
  # Build & Push Docker Images (only on master)
  # ──────────────────────────────────────────

  build-backend:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

  build-frontend:
    name: Build & Push Frontend Image
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  # ──────────────────────────────────────────
  # Deploy to VPS
  # ──────────────────────────────────────────

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs:
      - build-backend
      - build-frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Copy docker-compose.prod.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: docker-compose.prod.yml
          target: ~/app
      - name: Deploy containers on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export DATABASE_URL="${{ secrets.DATABASE_URL }}"
            export NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}"
            export BACKEND_IMAGE="${{ env.BACKEND_IMAGE }}:latest"
            export FRONTEND_IMAGE="${{ env.FRONTEND_IMAGE }}:latest"
            cd ~/app
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
